<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <style>
        /* Fondo negro por defecto mientras carga la imagen */
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000000; 
            /* Previene cualquier tipo de scroll accidental por el efecto de escala */
            overflow: hidden; 
            width: 100%;
            height: 100%;
        }

        /* Enlace que ocupa toda la pantalla de forma segura */
        .pantalla-boton {
            display: block;
            width: 100%;
            height: 100%;
            min-height: 100vh; /* Asegura el alto total en navegadores móviles */
            text-decoration: none;
            cursor: pointer;
            
            /* Configuración avanzada de la imagen de fondo */
            background-image: url('imagen-fondo.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            
            /* Transición suave para el efecto visual */
            transition: opacity 0.3s ease, transform 0.3s ease;
            
            /* Evita el resaltado azul molesto al tocar en pantallas táctiles */
            -webkit-tap-highlight-color: transparent; 
        }

        /* Efecto visual al pasar el cursor (Escritorio) */
        @media (hover: hover) {
            .pantalla-boton:hover {
                opacity: 0.85; 
                transform: scale(1.01); 
            }
        }

        /* Ajuste específico para pantallas verticales (Celulares/Tablets) */
        @media (max-width: 768px) and (orientation: portrait) {
            .pantalla-boton {
                /* Centra el protagonismo de la imagen si esta es muy apaisada */
                background-position: 50% center; 
            }
        }
    </style>
</head>
<body>

    <!-- Redirección directa a eventos.html -->
    <a href="eventos.html" class="pantalla-boton" title="Hacé clic para ingresar a Eventos">
    </a>

</body>
</html>
