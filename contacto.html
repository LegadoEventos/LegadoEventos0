<!-- FORMULARIO OPTIMIZADO: Cambie 'SU_FORM_ID' por su código real de Formspree -->
<form id="miFormularioContacto" action="https://formspree.io" method="POST">
    
    <!-- Casilla 1: Nombre (Obligatorio atributo name) -->
    <div>
        <label>Nombre Completo:</label>
        <input type="text" name="Nombre" placeholder="Ej: Juan Pérez" required>
    </div>
    
    <!-- Casilla 2: Correo (Obligatorio atributo name e input de tipo email) -->
    <div>
        <label>Correo Electrónico:</label>
        <input type="email" name="Email" placeholder="Ej: juan@correo.com" required>
    </div>
    
    <!-- Casilla 3: Mensaje (Obligatorio atributo name) -->
    <div>
        <label>Mensaje o Consulta:</label>
        <textarea name="Mensaje" placeholder="Escriba aquí su mensaje..." required></textarea>
    </div>
    
    <!-- Su botón dorado original (Debe ser de tipo submit) -->
    <button type="submit" class="SU_CLASE_DE_BOTON_DORADO">Enviar formulario</button>
</form>

<!-- SCRIPT DE REDIRECCIÓN AUTOMÁTICA -->
<script>
    document.getElementById("miFormularioContacto").addEventListener("submit", function(e) {
        e.preventDefault(); // Evita que la página salte a la web de Formspree
        
        var form = this;
        var data = new FormData(form);
        var button = form.querySelector('button[type="submit"]');
        
        button.disabled = true;
        button.innerText = "Enviando...";

        fetch(form.action, {
            method: form.method,
            body: data,
            headers: { 'Accept': 'application/json' }
        }).then(response => {
            if (response.ok) {
                // Redirección forzada exitosa a su página de contacto
                window.location.href = "contacto.html"; 
            } else {
                alert("Ocurrió un error al procesar el envío. Inténtelo más tarde.");
                button.disabled = false;
                button.innerText = "Enviar formulario";
            }
        }).catch(error => {
            alert("Error de conexión. Inténtelo más tarde.");
            button.disabled = false;
            button.innerText = "Enviar formulario";
        });
    });
</script>
