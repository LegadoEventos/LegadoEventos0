<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Línea de viewport obligatoria para activar el modo responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGADO EVENTOS - Contacto</title>
    <!-- Carga corregida y completa de la tipografía Montserrat -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body, html { 
            margin: 0; padding: 0; min-height: 100%; 
            background-color: #000; color: #fff; 
            font-family: 'Montserrat', sans-serif; 
            display: flex; justify-content: center; align-items: center;
            /* Se cambia a auto para permitir scroll si el contenido supera la pantalla en móviles cortos */
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* FONDO ACTUALIZADO CON DESTELLO DORADO MÁS INTENSO */
        .background-clean { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: 
                /* Capa superior: Destello dorado de alta intensidad en el centro (30% de opacidad) */
                radial-gradient(circle at center, rgba(212, 175, 55, 0.3) 0%, rgba(212, 175, 55, 0.05) 40%, rgba(0, 0, 0, 0) 80%),
                /* Capa inferior: Degradado oscuro original del sitio */
                radial-gradient(circle at center, #1a150a 0%, #000 100%); 
            z-index: -1;
        }

        .container { 
            text-align: center; width: 90%; max-width: 600px; padding: 60px 40px; 
            /* Se bajó levemente la opacidad del fondo blanco para que trasluzca más el destello dorado */
            background: rgba(255, 255, 255, 0.015); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); 
            border: 1px solid rgba(212, 175, 55, 0.15); /* Borde un poco más brillante */
            border-radius: 5px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.7); 
            box-sizing: border-box;
            margin: 20px 0; /* Margen de seguridad para pantallas de baja altura */
        }

        h1 { 
            font-size: clamp(2rem, 7vw, 2.8rem); /* Tamaño fluido que se adapta al ancho de pantalla */
            letter-spacing: 8px; margin-top: 0; margin-bottom: 25px; 
            font-weight: 900; text-transform: uppercase; 
            color: #fff; text-shadow: 0 0 20px #d4af37;
        }

        .intro-contacto {
            color: #d4af37;
            font-size: clamp(0.95rem, 4vw, 1.1rem); /* Escala de tamaño para celulares */
            line-height: 1.6;
            letter-spacing: 1px;
            margin-bottom: 45px;
            font-weight: 400;
        }

        .info-contacto {
            margin-bottom: 50px;
            font-size: 1.1rem;
            line-height: 1.8;
            color: rgba(255,255,255,0.8);
            font-weight: 300;
        }

        .cargo {
            color: #d4af37;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            display: block;
            margin-top: 25px;
            margin-bottom: 5px;
        }

        .link-contacto {
            color: #fff;
            text-decoration: none;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            display: inline-block;
            max-width: 100%;
            word-wrap: break-word; /* Rompe el texto largo (como emails) para que no rompa el diseño */
            font-size: clamp(0.85rem, 3.8vw, 1.1rem); /* Ajuste automático del tamaño de letra del link */
        }
        .link-contacto:hover { color: #d4af37; }

        .btn-regresar { 
            text-decoration: none; color: rgba(255, 255, 255, 0.5); 
            border: 1px solid rgba(212, 175, 55, 0.3); 
            padding: 15px 40px; font-size: 0.7rem; 
            letter-spacing: 4px; text-transform: uppercase; 
            transition: all 0.5s ease; font-weight: 700;
            display: inline-block;
            max-width: 100%;
            box-sizing: border-box;
        }

        .btn-regresar:hover { 
            background: rgba(212, 175, 55, 0.05); color: #d4af37; 
            border-color: #d4af37;
            transform: scale(1.02);
        }

        /* ==========================================================================
           MEDIA QUERIES PARA RESPONSIVE DESIGN (MÓVILES Y TABLETS)
           ========================================================================== */
        @media (max-width: 576px) {
            .container {
                padding: 40px 20px; /* Reducción de relleno lateral en celulares */
                width: 92%;
            }
            
            h1 {
                letter-spacing: 4px; /* Menor espaciado para que entre en una sola línea */
                margin-bottom: 20px;
            }

            .intro-contacto {
                margin-bottom: 30px;
            }

            .info-contacto {
                margin-bottom: 35px;
            }
            
            .cargo {
                margin-top: 20px;
            }

            .btn-regresar {
                width: 100%; /* El botón ocupa todo el ancho disponible para facilitar el clic */
                padding: 15px 20px;
                letter-spacing: 2px;
            }
        }

        /* Ajuste para teléfonos extra pequeños o pantallas en modo horizontal corto */
        @media (max-height: 650px) {
            body, html {
                align-items: flex-start; /* Evita que el contenedor quede cortado arriba */
            }
            .container {
                margin-top: 30px;
                margin-bottom: 30px;
            }
        }
    </style>
</head>
<body>

    <div class="background-clean"></div>

    <div class="container">
        <h1>CONTACTO</h1>
        
        <p class="intro-contacto">Su consulta es el primer paso para crear juntos un evento inolvidable. Contáctenos.</p>
        
        <div class="info-contacto">
            <span class="cargo">Email Empresarial</span>
            <a href="mailto:legado.eventos001@gmail.com" class="link-contacto">legado.eventos001@gmail.com</a>

            <span class="cargo">Líder de Ventas</span>
            <a href="mailto:malbanello@hotmail.com" class="link-contacto">malbanello@hotmail.com</a>

            <span class="cargo">Instagram</span>
            <a href="https://instagram.com" target="_blank" class="link-contacto">@legado.eventos_</a>

            <span class="cargo">Teléfono / WhatsApp</span>
            <a href="https://wa.me" target="_blank" class="link-contacto">+54 11 3040 7070</a>
        </div>
        
        <a href="eventos.html" class="btn-regresar">Volver al Inicio</a>
    </div>

</body>
</html>
